# Professional source registry — open or licensed only.
# Scraping property portals is forbidden (see docs/DATA_LICENSING.md).

policy:
  allow_portal_scraping: false
  preferred_sales_authority: "Registers of Scotland"
  notes: >
    England & Wales HM Land Registry Price Paid is not a substitute for
    Scottish completed sales. Use ROS open products or licensed extracts.

hpi:
  name: UK House Price Index
  licence: OGL
  role: council_level_average_price_for_residual_mv
  base_url: https://publicdata.landregistry.gov.uk/market-trend-data/house-price-index-data
  average_prices_template: Average-prices-{period}.csv
  indices_template: Indices-{period}.csv
  period: "2026-03"
  scotland_region_code: S92000003

postcodes:
  name: postcodes.io
  licence: open
  role: geocoding
  api_url: https://api.postcodes.io/postcodes

councils:
  rural_price_threshold_gbp: 145000
  rural_codes:
    - S12000013  # Na h-Eileanan Siar
    - S12000017  # Highland
    - S12000023  # Orkney Islands
    - S12000027  # Shetland Islands
    - S12000035  # Argyll and Bute

boundaries:
  councils:
    source_url: https://raw.githubusercontent.com/martinjc/UK-GeoJSON/master/json/administrative/gb/lad.json
    simplify_tolerance_degrees: 0.0008
  glasgow_ward_18:
    source_url: https://www.boundaries.scot/wp-content/uploads/2025/09/4th_Review_2007_2017_All_Scotland_wards_1758892796.zip
    council_name: Glasgow City
    ward_number: 18
    ward_name: East Centre
    validation_label: "Glasgow Ward 18 — East Centre (Wightman validation case study)"

parcels:
  name: ROS INSPIRE cadastral parcels (WMS)
  role: parcel_geometry_lookup
  wms_url: https://ros-inspire.themapcloud.com/maps/wms
  wms_layer: CP.CadastralParcel
  query_delta_degrees: 0.001
  timeout_seconds: 10

sales:
  status: scaffolded
  authority: Registers of Scotland
  fixture_path: data/fixtures/sales/ward18_synthetic.jsonl
  licensed_dir: data/licensed
  schema: backend/datasources/sales_schema.py
  forbidden:
    - zoopla_scrape
    - rightmove_scrape
    - espc_scrape
    - unofficial_scraped_dumps

what3words:
  role: place_grid_and_optional_address
  grid: 3m_aligned
  api_env: W3W_API_KEY

rebuild_costs:
  role: drc_for_residual
  config_path: data/config/agr.yaml  # valuer_roll.rebuild
