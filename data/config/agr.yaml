# Scotland AGR Map — calculation configuration
# SLRG economist sign-off: approved 2026-06-08 (Sandilands / Wightman / Pickard)
# Intellectual lineage (Smith → … → Pickard) is pedagogical; charge maths unchanged.

# ---------------------------------------------------------------------------
# Intellectual lineage (methodology / UI). Does not change residual maths.
# Core layers appear on the methodology page; satellites are "also see".
# ---------------------------------------------------------------------------
lineage:
  core:
    - id: smith
      name: "Adam Smith"
      role: "classical_ground_rent"
      summary: "Ground-rent is distinct revenue; can specially bear tax without taxing labour or buildings."
    - id: ricardo
      name: "David Ricardo"
      role: "differential_rent"
      summary: "Locational surplus accrues as rent — why this square costs more than that one."
    - id: ogilvie
      name: "William Ogilvie"
      role: "equal_natural_right"
      summary: "Equal natural right in land; improvements private; community claim on land rent (Scotland, 1781/82)."
    - id: george
      name: "Henry George"
      role: "full_rent_recovery"
      summary: "Full recovery of site rent as the primary public revenue (single-tax tradition)."
    - id: gaffney
      name: "Mason Gaffney"
      role: "atcor_ebcor"
      summary: "ATCOR / EBCOR — taxes and excess burdens ultimately load onto land rent."
    - id: harrison
      name: "Fred Harrison"
      role: "boom_bust_speculation"
      summary: "Land-price cycles and speculative capitalisation inflate market values above economic rent."
    - id: stiglitz
      name: "Joseph Stiglitz"
      role: "henry_george_theorem"
      summary: "Public goods and amenity capitalise into land values — community creates the rent."
    - id: macfarlane
      name: "Laurie Macfarlane"
      role: "modern_housing_land_market"
      summary: "Housing crisis is largely a land market; hope value and financialisation (Scotland/UK)."
    - id: adams
      name: "Martin Adams (Unitism)"
      role: "community_land_contribution"
      summary: "Community collects land rental value; wages/buildings untaxed; revenue funds services or a citizen dividend (Unitism)."
      url: "https://unitism.com/"
    - id: sandilands
      name: "Roger Sandilands"
      role: "scotland_macro"
      summary: "Scotland rent pool (~50% of GDP); income-tax replacement and growth arguments."
    - id: wightman
      name: "Andy Wightman"
      role: "residual_valuation"
      summary: "Residual / HABU site capital for Scottish locations."
    - id: pickard
      name: "Duncan Pickard"
      role: "despeculation"
      summary: "Charge economic (productive) rent after removing speculative premium."
  satellite:
    - id: mill
      name: "John Stuart Mill"
      role: "unearned_increment"
      summary: "Social claim on unearned rises in land value from general progress."
    - id: paine
      name: "Thomas Paine"
      role: "agrarian_dividend"
      summary: "Agrarian Justice — land rent as the basis for an equal citizen dividend."
    - id: sci
      name: "School of Cooperative Individualism"
      role: "georgist_source_library"
      summary: "Edward J. Dodson's archive of Georgist / single-tax texts, Henry George materials, periodicals, and land-question literature — primary-source library for the lineage."
      url: "https://cooperative-individualism.org/index.htm"
    - id: doucet
      name: "Lars Doucet / Center for Land Economics"
      role: "modern_lvt_mass_appraisal"
      summary: "Land is a Big Deal; open mass appraisal (OpenAVMKit) and city LVT incidence research — path to a finer AGR roll."
      url: "https://landeconomics.org/home"
    - id: openavmkit
      name: "OpenAVMKit"
      role: "foss_mass_appraisal"
      summary: "FOSS automated valuation / land modeling toolkit (CLE) for sales-based residual and ratio studies."
      url: "https://www.openavmkit.com/"
    - id: mcewen
      name: "John McEwen"
      role: "ownership_transparency"
      summary: "Who Owns Scotland — concentration of land ownership and who captures rent."
    - id: churchill_1909
      name: "Winston Churchill (1909 land campaign)"
      role: "uk_political_history"
      summary: "Historic UK political case against land monopoly and for taxing land values."
    - id: slc
      name: "Scottish Land Commission"
      role: "modern_reform_options"
      summary: "Hope value, public interest, and LVT policy options for contemporary Scotland."

# Ogilvie / Paine / Unitism equal-share illustration (framing only; same economic rent).
equal_share:
  enabled: true
  scotland_population: 5480000
  notes: "Equal annual claim ≈ Scotland rent pool ÷ population (Ogilvie right; Paine / Unitism citizen-dividend framing)."
  unitism_dividend_framing: true

macro:
  rent_share_of_gdp: 0.50
  scotland_income_tax_replacement_gbp: 11500000000
  estimated_scotland_annual_rent_gbp: 90000000000
  deadweight_loss_conventional: 0.10
  growth_boost_percentage_points: 2.0
  # Gaffney formalised ATCOR/EBCOR; Sandilands applies the rent-shift case to Scotland.
  atcor: true
  ebcor: true

# ---------------------------------------------------------------------------
# Fiscal tool — tax replacement narrative for politicians (research figures)
# Basket totals are order-of-magnitude SG/HMRC-style placeholders; update yearly.
# National collection uses Sandilands pool ratios; place map uses residual roll.
# ---------------------------------------------------------------------------
fiscal:
  enabled: true
  purpose: "Show revenue-neutral-or-better tax replacement from land rent; high-rent places pay most; remote/low-rent can be net receivers."
  basket:
    note: "Research mid-year placeholders for demo — not an OBR forecast. Cite / refresh from SG and HMRC stats."
    lines:
      - id: income_tax
        label: "Scotland income tax"
        annual_gbp: 11500000000
      - id: council_tax
        label: "Council Tax"
        annual_gbp: 2800000000
      - id: ndr
        label: "Non-domestic rates (NDR)"
        annual_gbp: 2800000000
    # Sum of lines is the taxes-to-replace total T
  dividend:
    # equal_share_of_pool: pool ÷ population (Ogilvie/Paine/Unitism)
    # equal_share_of_surplus: max(0, national collection − basket) ÷ population
    # none: no dividend in net position
    mode: equal_share_of_pool
    enabled: true
  remote_credit:
    enabled: true
    # Extra £/person/year support for designated remote/island councils (negative net tax)
    credit_gbp_per_person_year: 500
    councils:
      - S12000013  # Na h-Eileanan Siar
      - S12000023  # Orkney Islands
      - S12000027  # Shetland Islands
      - S12000017  # Highland
      - S12000035  # Argyll and Bute
    notes: "Optional repopulation / periphery support on top of equal dividend — research policy knob, not statute."
  integrity:
    - "National surplus uses Sandilands rent pool × scenario rate, not the sum of map residual cells."
    - "Place net = plot gross AGR − equal dividend (− remote credit). Household of one for comparison."
    - "Not a live tax bill; residual is open-data research approximation."

# ---------------------------------------------------------------------------
# Valuer-style AGR roll (primary charge path)
# MV − DRC residual (Wightman) → Pickard economic base → × yield = annual rent
# ---------------------------------------------------------------------------
valuer_roll:
  method: residual_drc
  habu_default: existing_use
  exclude_hope_value: true
  typical_dwelling_sqm: 85
  # Notional residential plot for whole-site roll line (Scotland suburban average order)
  typical_plot_sqm: 280
  yield_rate: 0.05  # traditional rentalisation (Pickard: farm rent historically ~5% of capital)
  property_mix:
    house_share: 0.75
    flat_share: 0.25
  rebuild:
    # BCIS/ABI-style rebuild costs (Scotland baseline £/m² internal)
    house_gbp_per_m2: 1950
    flat_gbp_per_m2: 2300
    region_factors:
      default: 1.0
      S12000036: 1.08   # City of Edinburgh
      S12000049: 1.05   # Glasgow City
      S12000046: 1.04   # Glasgow (legacy code if present)
      S12000042: 1.03   # Dundee
      S12000033: 1.03   # Aberdeen
      S12000017: 0.95   # Highland
      S12000013: 1.05   # Na h-Eileanan Siar
  depreciation:
    # DRC = rebuild_new × remaining factor (average stock, not new-build)
    average_stock_remaining_factor: 0.55
  residual:
    min_site_share: 0.15
    max_site_share: 0.85

# Legacy keys retained for config consumers / methodology display
valuation:
  primary_method: residual_drc
  fallback_method: productive_land_use
  rural_fallback: land_use_category
  yield_rate: 0.05
  habu_rule: existing_authorised_use
  typical_dwelling_sqm: 85
  hpi_base_year: 2009

site_share:
  # Implied by residual; retained for reference / sensitivity only
  residential_wightman: 0.49
  residential_slrg: 0.60
  use_slrg_for_display: false

despeculation:
  # Pickard 2018: prime farms market ~5× productive → 0.20 of market capital
  farmland_market_to_productive: 0.20
  # Urban: static economic factor on residual site capital (SLRG-tuned; not a published table)
  urban_speculation_discount: 0.70
  marginal_land_rent: 0

per_square:
  area_sqm: 9
  agr_capture_rate: 1.0

land_use_values_gbp_per_ha_2009:
  residential: 1500000
  business_retail: 1000000
  urban_vacant: 625000
  industrial: 250000
  forestry: 1000
  agriculture: 4094
  sporting_estates: 100
  infrastructure: 0
  open_space: 0

scenarios:
  full_agr:
    capture_rate: 1.0
    label: "Full land rent (surplus for services + dividend)"
  replace_income_tax:
    target_gbp: 11500000000
    label: "Replace income tax only"
  revenue_neutral:
    rate_per_pound: 0.0316
    label: "Replace Council Tax + NDR"
  replace_full_basket:
    # Collect fiscal basket total from national rent pool (revenue-neutral on listed taxes)
    label: "Replace all listed taxes (neutral)"
    use_fiscal_basket: true

disclaimer: "SLRG-aligned valuer residual AGR estimate — open-data approximation of a roll, not an official rates bill"

integrity:
  estimate_kind: "valuer_residual_roll"
  estimate_label: "Valuer residual AGR roll (open-data approximation)"
  macro_pool_label: "National rent pool (Sandilands)"
  caveats:
    - "Urban path: market value (council HPI) − DRC of improvements (rebuild × stock remaining) = market site capital (Wightman residual)."
    - "Economic rent base applies Pickard factors to residual site capital, then × 5% yield for annual AGR."
    - "HABU policy = existing authorised use; hope value excluded from assessment basis. HPI is still average existing-use sales, not a full planning strip."
    - "Spatial grain is council-level HPI (flat within council) until sales/CAMA microdata is added — not a finished national roll."
    - "Rural path uses productive land-use capital (Pickard 5× farmland market distortion), not farm-sale residual."
    - "The Sandilands national rent pool (£90bn) is separate; map roll cells are not calibrated to sum to that pool."
    - "Non-domestic, vacant, and natural-resource rents (Sandilands classical Land) are not yet on this roll."
    - "Not a substitute for a VOA/ROS professional valuation or a statutory AGR roll."

economist_signoff:
  status: approved
  signed_by: "SLRG economist"
  signed_at: "2026-06-08"
  organisation: "Scottish Land Revenue Group"
  notes: "Macro, Pickard factors, yield, and scenario parameters approved for public research deployment. Residual DRC rebuild costs are open-data approximations pending surveyor calibration."
